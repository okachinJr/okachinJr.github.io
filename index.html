<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Okachin Jr の個人サイト。制作物、メモ、プロフィールを掲載しています。"
  />
  <title>Okachin Jr</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <script src="./scripts/main.js?v=2" defer></script>
</head>
<body>
  <div class="site-shell">
    <main>
      <section class="hero" id="home" aria-label="おかちんJr. タイトル画面">
        <img
          class="hero-image"
          src="./assets/images/hero-title-screen.png"
          alt="ゲームボーイ風のタイトル画面。おかちんJr. の文字と人物、PRESS STARTボタンが描かれている"
        />
        <a class="press-start-link" href="#links" aria-label="スタートしてリンク一覧を見る"></a>
      </section>

      <nav class="icon-launcher" id="links" aria-label="リンク集">
        <a class="launcher-item" href="#" data-link-slot="GAME" aria-label="自作Game置き場">
          <img src="./assets/icons/game.png" alt="" />
        </a>
        <a class="launcher-item" href="#" data-link-slot="WEB APP" aria-label="自作Webアプリ置き場">
          <img src="./assets/icons/web-app.png" alt="" />
        </a>
        <a class="launcher-item" href="#" data-link-slot="PIXEL ART" aria-label="ピクセルアート置き場">
          <img src="./assets/icons/pixel-art.png" alt="" />
        </a>
        <a class="launcher-item" href="#" data-link-slot="X" aria-label="X">
          <img src="./assets/icons/x.png" alt="" />
        </a>
        <a class="launcher-item" href="#" data-link-slot="NOTE" aria-label="Note">
          <img src="./assets/icons/note.png" alt="" />
        </a>
        <a class="launcher-item" href="#" data-link-slot="INSTAGRAM" aria-label="Instagram">
          <img src="./assets/icons/instagram.png" alt="" />
        </a>
      </nav>
    </main>
  </div>

  <div class="toast" role="status" aria-live="polite"></div>
</body>
</html>
