<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかちんJr. | 個人サイト</title>
<meta name="description" content="おかちんJr.の個人サイト。自作サイト、note、Xへのリンクを掲載しています。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3E%3Crect width='8' height='8' fill='%231e3a20'/%3E%3Crect x='1' y='1' width='6' height='6' fill='%23e4eec6'/%3E%3Crect x='2' y='2' width='4' height='4' fill='%238fae5e'/%3E%3Crect x='3' y='3' width='2' height='2' fill='%231e3a20'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --gb0: #1e3a20; /* 最暗 / インク */
    --gb1: #4a6b3d;
    --gb2: #8fae5e;
    --gb3: #cfe0a0;
    --gb4: #e4eec6; /* 最明 */
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    max-width: 100%;
    overflow-x: hidden;
  }

  body {
    min-height: 100svh;
    background: var(--gb0);
    color: var(--gb4);
    font-family: 'DotGothic16', sans-serif;
    line-height: 1.7;
  }

  img {
    display: block;
    max-width: 100%;
  }

  .pixelated {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  a:focus-visible {
    outline: 3px dashed var(--gb3);
    outline-offset: 3px;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .site-home {
    width: min(100%, 420px);
    margin: 0 auto;
    padding: 24px 16px 32px;
  }

  .hero {
    margin: 0;
    border: 3px solid var(--gb3);
    background: var(--gb1);
    box-shadow: 4px 4px 0 var(--gb1);
    overflow: hidden;
    clip-path: polygon(
      8px 0,
      calc(100% - 8px) 0,
      calc(100% - 8px) 3px,
      100% 3px,
      100% calc(100% - 8px),
      calc(100% - 3px) calc(100% - 8px),
      calc(100% - 3px) 100%,
      8px 100%,
      8px calc(100% - 3px),
      0 calc(100% - 3px),
      0 8px,
      3px 8px,
      3px 3px,
      8px 3px
    );
  }

  .hero img {
    width: 100%;
    height: auto;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    image-rendering: pixelated;
  }

  .primary-links {
    display: grid;
    gap: 16px;
    margin-top: 24px;
  }

  .secondary-links {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .link-card {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    color: var(--gb0);
    background: var(--gb3);
    border: 3px solid var(--gb1);
    box-shadow: 4px 4px 0 var(--gb1);
    text-align: center;
    text-decoration: none;
    transition: transform 0.05s linear;
  }

  .link-card:hover,
  .link-card:focus-visible {
    background: var(--gb4);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--gb1);
  }

  .link-card--inactive,
  .link-card--inactive:hover {
    background: var(--gb3);
    transform: none;
    box-shadow: 4px 4px 0 var(--gb1);
  }

  .link-card--inactive {
    pointer-events: none;
  }

  .link-card--primary {
    min-height: 80px;
    padding: 16px 24px;
  }

  .link-card--secondary {
    min-height: 64px;
    padding: 16px;
  }

  .link-card__content {
    display: grid;
    gap: 8px;
  }

  .link-card__label {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.875rem;
    line-height: 1.4;
    letter-spacing: 0.04em;
  }

  .link-card__description {
    font-size: 0.875rem;
    line-height: 1.4;
  }

  .site-footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 2px solid var(--gb1);
    text-align: center;
  }

  .copyright {
    margin: 0;
    color: var(--gb2);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.75rem;
    line-height: 1.6;
  }
</style>
</head>
<body>

<main class="site-home" aria-labelledby="site-title">
  <h1 class="sr-only" id="site-title">おかちんJr.</h1>

  <section class="hero" aria-label="おかちんJr. キービジュアル">
    <img
      class="pixelated"
      src="assets/images/hero-home-v2.png"
      alt="緑モノクロのピクセルアートで描かれた「おかちんJr.」のロゴと主人公。"
      width="1448"
      height="1086"
    >
  </section>

  <nav class="primary-links" aria-label="メインナビゲーション">
    <div class="link-card link-card--primary link-card--inactive" aria-label="MY WEBSITE（リンク非公開）">
      <span class="link-card__content">
        <span class="link-card__label">MY WEBSITE</span>
        <span class="link-card__description">自作サイト</span>
      </span>
    </div>

    <div class="secondary-links">
      <a class="link-card link-card--secondary" href="https://note.com/okachinjr" target="_blank" rel="noopener noreferrer">
        <span class="link-card__label">note</span>
      </a>
      <a class="link-card link-card--secondary" href="https://x.com/okachinJr" target="_blank" rel="noopener noreferrer">
        <span class="link-card__label">X</span>
      </a>
    </div>
  </nav>

  <footer class="site-footer">
    <p class="copyright">&copy; 1995 OKACHIN JR.</p>
  </footer>
</main>

</body>
</html>
