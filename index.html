<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかちんJr. | 個人サイト</title>
<meta name="description" content="おかちんJr.の個人サイト。noteとXへのリンクを掲載しています。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3E%3Crect width='8' height='8' fill='%231e3a20'/%3E%3Crect x='1' y='1' width='6' height='6' fill='%23e4eec6'/%3E%3Crect x='2' y='2' width='4' height='4' fill='%238fae5e'/%3E%3Crect x='3' y='3' width='2' height='2' fill='%231e3a20'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --gb0: #1e3a20;
    --gb1: #4a6b3d;
    --gb2: #8fae5e;
    --gb3: #cfe0a0;
    --gb4: #e4eec6;
    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 32px;
    --space-6: 48px;
  }

  * {
    box-sizing: border-box;
  }

  html {
    max-width: 100%;
    overflow-x: hidden;
    background: var(--gb0);
  }

  body {
    min-width: 0;
    min-height: 100svh;
    margin: 0;
    overflow-x: hidden;
    background: var(--gb0);
    color: var(--gb4);
    font-family: 'DotGothic16', sans-serif;
    line-height: 1.6;
  }

  img,
  picture {
    display: block;
    max-width: 100%;
  }

  img {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  a {
    color: inherit;
  }

  a:focus-visible {
    outline: 4px dashed var(--gb3);
    outline-offset: 6px;
  }

  .site-home {
    width: min(calc(100% - var(--space-6)), 960px);
    margin: 0 auto;
    padding: var(--space-3) 0;
  }

  .hero-card,
  .link-card {
    min-width: 0;
    background: var(--gb4);
    border: 3px solid var(--gb2);
    box-shadow: 8px 8px 0 var(--gb1);
  }

  .hero-card__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
    min-height: 56px;
    padding: 12px var(--space-3);
    border-bottom: 3px solid var(--gb2);
    color: var(--gb0);
  }

  .hero-card__title {
    margin: 0;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.75rem, 2.5vw, 1rem);
    line-height: 1.5;
  }

  .hero-card__year {
    flex: 0 0 auto;
    padding: 4px var(--space-1);
    background: var(--gb0);
    color: var(--gb4);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6875rem;
    line-height: 1.6;
  }

  .hero-scene,
  .link-card__stage {
    background-color: var(--gb4);
    background-image:
      repeating-linear-gradient(0deg, var(--gb3) 0 2px, transparent 2px 40px),
      repeating-linear-gradient(90deg, var(--gb3) 0 2px, transparent 2px 40px);
  }

  .hero-scene {
    position: relative;
    display: grid;
    place-items: center;
    aspect-ratio: 1.85 / 1;
    overflow: hidden;
  }

  .hero-stage {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .hero-logo,
  .hero-characters {
    position: absolute;
    display: block;
    height: auto;
    margin: 0;
  }

  .hero-logo {
    z-index: 3;
    top: 40%;
    left: 3%;
    width: 49%;
    transform: translateY(-50%);
  }

  .hero-characters {
    z-index: 2;
    right: 0;
    bottom: 0;
    width: 70%;
  }

  .link-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--space-4);
    margin-top: var(--space-3);
  }

  .link-card {
    display: grid;
    grid-template-rows: auto 40px;
    color: var(--gb0);
    text-align: center;
    text-decoration: none;
    transition: transform 0.05s linear;
  }

  .link-card:hover,
  .link-card:focus-visible {
    transform: translate(4px, 4px);
    box-shadow: 4px 4px 0 var(--gb1);
  }

  .link-card:hover .link-card__stage,
  .link-card:focus-visible .link-card__stage {
    background-color: var(--gb3);
  }

  .link-card--inactive,
  .link-card--inactive:hover {
    transform: none;
    box-shadow: 8px 8px 0 var(--gb1);
  }

  .link-card--inactive {
    pointer-events: none;
  }

  .link-card__stage {
    display: grid;
    place-items: center;
    min-width: 0;
    aspect-ratio: 293 / 228;
    overflow: hidden;
    border-bottom: 3px solid var(--gb2);
  }

  .link-card__picture,
  .nav-art {
    width: 100%;
    height: 100%;
  }

  .nav-art {
    object-fit: contain;
    object-position: center;
  }

  .link-card__label {
    display: grid;
    place-items: center;
    min-width: 0;
    min-height: 0;
    padding: 0 var(--space-1);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.75rem;
    line-height: 1;
    white-space: nowrap;
  }

  .site-footer {
    margin-top: var(--space-3);
    padding-top: var(--space-2);
    border-top: 2px solid var(--gb1);
    text-align: center;
  }

  .copyright {
    margin: 0;
    color: var(--gb2);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6875rem;
    line-height: 1.7;
  }

  @media (max-width: 699px) {
    .site-home {
      width: min(calc(100% - var(--space-4)), 420px);
      padding-top: var(--space-2);
      padding-bottom: var(--space-3);
    }

    .hero-card,
    .link-card {
      box-shadow: 4px 4px 0 var(--gb1);
    }

    .hero-card__head {
      min-height: 48px;
      padding: var(--space-1) 12px;
    }

    .hero-card__title,
    .hero-card__year {
      font-size: 0.6875rem;
    }

    .hero-scene {
      display: grid;
      aspect-ratio: auto;
    }

    .hero-scene,
    .link-card__stage {
      background-image:
        repeating-linear-gradient(0deg, var(--gb3) 0 2px, transparent 2px 32px),
        repeating-linear-gradient(90deg, var(--gb3) 0 2px, transparent 2px 32px);
    }

    .hero-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(100%, 420px);
      height: auto;
      padding-top: var(--space-2);
    }

    .hero-logo,
    .hero-characters {
      position: relative;
      inset: auto;
      height: auto;
      transform: none;
    }

    .hero-logo {
      z-index: 3;
      width: 80%;
    }

    .hero-characters {
      z-index: 2;
      width: 106%;
      margin-top: -20px;
    }

    .link-grid {
      gap: var(--space-1);
    }

    .link-card {
      grid-template-rows: 120px 32px;
    }

    .link-card--inactive,
    .link-card--inactive:hover {
      box-shadow: 4px 4px 0 var(--gb1);
    }

    .link-card__stage {
      aspect-ratio: auto;
    }

    .link-card__label {
      padding: 0 2px;
      font-size: 0.6875rem;
    }

    .link-card--inactive .link-card__label {
      letter-spacing: -1px;
    }
  }

  @media (max-width: 359px) {
    .site-home {
      width: min(calc(100% - var(--space-3)), 420px);
    }

    .link-card {
      grid-template-rows: 104px 32px;
    }

    .link-card__label {
      font-size: 0.625rem;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .link-card {
      transition: none;
      transform: none !important;
    }
  }
</style>
</head>
<body>

<main class="site-home">
  <section class="hero-card" aria-labelledby="site-title">
    <header class="hero-card__head">
      <h1 class="hero-card__title" id="site-title">OKACHIN JR. HOMEPAGE</h1>
      <span class="hero-card__year">1995</span>
    </header>

    <div class="hero-scene" aria-label="おかちんJr. キービジュアル">
      <div class="hero-stage">
        <img
          class="hero-logo"
          src="assets/images/logo-home-v1.png"
          alt="おかちんJr."
          width="680"
          height="214"
        >
        <img
          class="hero-characters"
          src="assets/images/hero-character-desktop-v3.png"
          alt="主人公、ヒロイン、魔王、犬、原稿、ビリヤード球AI"
          width="697"
          height="520"
        >
      </div>
    </div>
  </section>

  <nav class="link-grid" aria-label="サイトナビゲーション">
    <div class="link-card link-card--inactive" aria-label="MY WEBSITE（リンク非公開）">
      <span class="link-card__stage">
        <picture class="link-card__picture">
          <source media="(max-width: 699px)" srcset="assets/candidates/nav-card-vignette-phone-v1/my-website-phone-v1.png">
          <img
            class="nav-art"
            src="assets/candidates/nav-card-vignette-pc-v1/my-website-pc-v1.png"
            alt="複数のレトロPCを操作する魔王"
            width="1172"
            height="912"
          >
        </picture>
      </span>
      <span class="link-card__label">MY WEBSITE</span>
    </div>

    <a class="link-card" href="https://note.com/okachinjr" target="_blank" rel="noopener noreferrer">
      <span class="link-card__stage">
        <picture class="link-card__picture">
          <source media="(max-width: 699px)" srcset="assets/candidates/nav-card-vignette-phone-v1/note-phone-v1.png">
          <img
            class="nav-art"
            src="assets/candidates/nav-note-billiard-ai-pc-v1/note-billiard-ai-d-pc-v1.png"
            alt="レトロワープロでnoteを執筆するビリヤード球AI"
            width="1172"
            height="912"
          >
        </picture>
      </span>
      <span class="link-card__label">note</span>
    </a>

    <a class="link-card" href="https://x.com/okachinJr" target="_blank" rel="noopener noreferrer">
      <span class="link-card__stage">
        <picture class="link-card__picture">
          <source media="(max-width: 699px)" srcset="assets/candidates/nav-card-vignette-phone-v1/x-phone-v1.png">
          <img
            class="nav-art"
            src="assets/candidates/nav-card-vignette-pc-v1/x-pc-v1.png"
            alt="焚き火で焦げて目がバツになった鳥"
            width="1172"
            height="912"
          >
        </picture>
      </span>
      <span class="link-card__label">X</span>
    </a>
  </nav>

  <footer class="site-footer">
    <p class="copyright">&copy; 1995 OKACHIN JR.</p>
  </footer>
</main>

</body>
</html>
